<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Jarvis – AI Assistant</title>
  <!-- Tailwind CSS CDN with class-based dark mode -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: {
              50: '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              300: '#cbd5e1',
              400: '#94a3b8',
              500: '#64748b',
              600: '#475569',
              700: '#334155',
              800: '#1e293b',
              900: '#0f172a',
              950: '#020617',
            }
          }
        }
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Marked.js for Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* Custom scrollbar & code block styling */
    pre {
      background: #f1f5f9;
      padding: 1rem;
      border-radius: 0.5rem;
      overflow-x: auto;
      margin: 0.5rem 0;
      font-size: 0.875rem;
      line-height: 1.5;
    }
    .dark pre {
      background: #1e293b;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
    }
    pre code {
      background: none !important;
      padding: 0 !important;
    }
    .chat-message p { margin-bottom: 0.5rem; }
    .chat-message ul, .chat-message ol { margin-left: 1.5rem; margin-bottom: 0.5rem; }
    /* Loading overlay */
    #loading {
      position: fixed;
      inset: 0;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-size: 1.25rem;
      color: #64748b;
    }
    .dark #loading {
      background: #0f172a;
      color: #94a3b8;
    }
    /* Typing cursor */
    .typing-cursor::after {
      content: '▋';
      animation: blink 1s step-end infinite;
      margin-left: 2px;
      opacity: 0.7;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    /* Mobile safe area */
    .safe-bottom {
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
  </style>
</head>
<body class="bg-white dark:bg-dark-950 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">

  <!-- Loading fallback -->
  <div id="loading">Loading App...</div>

  <!-- Main App (hidden until JS loads) -->
  <div id="app" class="flex min-h-screen w-full invisible">
    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-72 bg-gray-50 dark:bg-dark-900 border-r border-gray-200 dark:border-gray-700 transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0 flex flex-col">
      <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
        <h2 class="font-semibold text-lg">Chats</h2>
        <button id="newChatBtn" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-dark-700 text-blue-600 dark:text-blue-400" title="New Chat">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
        </button>
      </div>
      <div id="chatList" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
      <div class="p-3 border-t border-gray-200 dark:border-gray-700 text-xs text-gray-500 dark:text-gray-400 flex justify-between items-center">
        <span>Jarvis v1.0</span>
        <button id="darkToggle" class="p-1 rounded hover:bg-gray-200 dark:hover:bg-dark-700" title="Toggle dark mode">
          <svg id="darkIcon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        </button>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col w-full md:w-0 relative">
      <!-- Top bar (mobile menu + actions) -->
      <header class="flex items-center justify-between p-3 border-b border-gray-200 dark:border-gray-700 sticky top-0 bg-white dark:bg-dark-950 z-30">
        <div class="flex items-center gap-2">
          <button id="menuBtn" class="md:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-dark-800" title="Menu">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
          <h1 id="currentChatTitle" class="font-semibold truncate max-w-[200px]">New Chat</h1>
        </div>
        <button id="settingsBtn" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-dark-800" title="Settings">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </button>
      </header>

      <!-- Chat Messages -->
      <div id="chatContainer" class="flex-1 overflow-y-auto p-4 space-y-4 pb-2 safe-bottom"></div>

      <!-- Input Bar (always visible) -->
      <div class="sticky bottom-0 bg-white dark:bg-dark-950 border-t border-gray-200 dark:border-gray-700 p-3 safe-bottom">
        <div class="flex items-end gap-2 max-w-3xl mx-auto">
          <button id="micBtn" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-dark-800 text-gray-500 dark:text-gray-400 transition-colors flex-shrink-0" title="Voice input">
            <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
            </svg>
          </button>
          <textarea id="userInput" rows="1" class="flex-1 resize-none rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-dark-800 px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400" placeholder="Message Jarvis..." style="max-height:120px;"></textarea>
          <button id="sendBtn" class="p-2 rounded-full bg-blue-600 hover:bg-blue-700 text-white flex-shrink-0 disabled:opacity-50 disabled:cursor-not-allowed" title="Send message">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 hidden">
    <div class="bg-white dark:bg-dark-900 rounded-xl shadow-xl w-full max-w-md mx-4 p-6 max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-semibold">Settings</h3>
        <button id="closeSettingsBtn" class="p-1 rounded hover:bg-gray-100 dark:hover:bg-dark-700">&times;</button>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">OpenRouter API Key</label>
          <input type="password" id="apiKeyInput" class="w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-dark-800 px-3 py-2 text-sm" placeholder="sk-or-...">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Model</label>
          <input type="text" id="modelInput" class="w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-dark-800 px-3 py-2 text-sm" value="deepseek/deepseek-r1:free">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">System Prompt (current chat)</label>
          <textarea id="systemPromptInput" rows="3" class="w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-dark-800 px-3 py-2 text-sm" placeholder="You are a helpful assistant..."></textarea>
        </div>
        <div class="flex items-center gap-2">
          <input type="checkbox" id="autoSendVoice" checked class="rounded">
          <label for="autoSendVoice" class="text-sm">Auto-send after voice input</label>
        </div>
        <button id="saveSettingsBtn" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">Save Settings</button>
      </div>
    </div>
  </div>

  <!-- Chat context menu (rename/delete) -->
  <div id="contextMenu" class="fixed z-50 bg-white dark:bg-dark-800 border border-gray-200 dark:border-gray-600 rounded-lg shadow-lg py-1 hidden" style="min-width:150px;">
    <button data-action="rename" class="w-full text-left px-3 py-2 text-sm hover:bg-gray-100 dark:hover:bg-dark-700">Rename</button>
    <button data-action="delete" class="w-full text-left px-3 py-2 text-sm hover:bg-gray-100 dark:hover:bg-dark-700 text-red-500">Delete</button>
  </div>

  <!-- Voice status toast -->
  <div id="voiceToast" class="fixed bottom-20 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-sm px-4 py-2 rounded-full hidden items-center gap-2 z-50">
    <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
    <span id="voiceText">Listening...</span>
  </div>

  <script>
    // ---------- APP INITIALIZATION ----------
    document.addEventListener('DOMContentLoaded', () => {
      // Hide loading and show app
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').classList.remove('invisible');

      // ---------- GLOBAL STATE ----------
      const STATE = {
        chats: [],               // { id, name, messages: [], systemPrompt: '' }
        activeChatId: null,
        apiKey: localStorage.getItem('jarvis_api_key') || '',
        model: localStorage.getItem('jarvis_model') || 'deepseek/deepseek-r1:free',
        darkMode: localStorage.getItem('jarvis_dark') === 'true',
        autoSendVoice: localStorage.getItem('jarvis_auto_voice') !== 'false', // default true
        streamingAbort: null,
        recognition: null,
        isListening: false
      };

      // DOM elements
      const sidebar = document.getElementById('sidebar');
      const chatListEl = document.getElementById('chatList');
      const chatContainer = document.getElementById('chatContainer');
      const userInput = document.getElementById('userInput');
      const sendBtn = document.getElementById('sendBtn');
      const micBtn = document.getElementById('micBtn');
      const micIcon = document.getElementById('micIcon');
      const newChatBtn = document.getElementById('newChatBtn');
      const darkToggle = document.getElementById('darkToggle');
      const darkIcon = document.getElementById('darkIcon');
      const menuBtn = document.getElementById('menuBtn');
      const settingsBtn = document.getElementById('settingsBtn');
      const settingsModal = document.getElementById('settingsModal');
      const closeSettingsBtn = document.getElementById('closeSettingsBtn');
      const apiKeyInput = document.getElementById('apiKeyInput');
      const modelInput = document.getElementById('modelInput');
      const systemPromptInput = document.getElementById('systemPromptInput');
      const autoSendVoiceCheck = document.getElementById('autoSendVoice');
      const saveSettingsBtn = document.getElementById('saveSettingsBtn');
      const contextMenu = document.getElementById('contextMenu');
      const voiceToast = document.getElementById('voiceToast');
      const voiceText = document.getElementById('voiceText');
      const currentChatTitle = document.getElementById('currentChatTitle');

      // Apply dark mode
      if (STATE.darkMode) document.documentElement.classList.add('dark');
      updateDarkIcon();

      // Load chats
      loadChats();
      if (STATE.chats.length === 0) {
        createNewChat();
      } else {
        // Set active to first or last saved
        const savedActive = localStorage.getItem('jarvis_active_chat');
        if (savedActive && STATE.chats.find(c => c.id === savedActive)) {
          setActiveChat(savedActive);
        } else {
          setActiveChat(STATE.chats[0].id);
        }
      }

      // ---------- EVENT LISTENERS ----------
      sendBtn.addEventListener('click', handleSend);
      userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      });
      // Auto-resize textarea
      userInput.addEventListener('input', autoResizeTextarea);

      newChatBtn.addEventListener('click', createNewChat);
      darkToggle.addEventListener('click', toggleDarkMode);
      menuBtn.addEventListener('click', toggleSidebar);
      settingsBtn.addEventListener('click', () => settingsModal.classList.remove('hidden'));
      closeSettingsBtn.addEventListener('click', () => settingsModal.classList.add('hidden'));
      settingsModal.addEventListener('click', (e) => { if (e.target === settingsModal) settingsModal.classList.add('hidden'); });
      saveSettingsBtn.addEventListener('click', saveSettings);

      // Voice button
      micBtn.addEventListener('click', toggleVoiceInput);

      // Context menu for chats
      chatListEl.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        const chatItem = e.target.closest('[data-chat-id]');
        if (!chatItem) return;
        const chatId = chatItem.dataset.chatId;
        showContextMenu(e.clientX, e.clientY, chatId);
      });
      document.addEventListener('click', () => contextMenu.classList.add('hidden'));
      contextMenu.querySelector('[data-action="rename"]').addEventListener('click', () => {
        const chatId = contextMenu.dataset.chatId;
        renameChat(chatId);
        contextMenu.classList.add('hidden');
      });
      contextMenu.querySelector('[data-action="delete"]').addEventListener('click', () => {
        const chatId = contextMenu.dataset.chatId;
        deleteChat(chatId);
        contextMenu.classList.add('hidden');
      });

      // Mobile: close sidebar on outside click
      document.addEventListener('click', (e) => {
        if (window.innerWidth < 768 && !sidebar.contains(e.target) && e.target !== menuBtn) {
          sidebar.classList.add('-translate-x-full');
        }
      });

      // ---------- FUNCTIONS ----------
      function loadChats() {
        try {
          const saved = localStorage.getItem('jarvis_chats');
          STATE.chats = saved ? JSON.parse(saved) : [];
        } catch { STATE.chats = []; }
      }

      function saveChats() {
        localStorage.setItem('jarvis_chats', JSON.stringify(STATE.chats));
        if (STATE.activeChatId) localStorage.setItem('jarvis_active_chat', STATE.activeChatId);
      }

      function createNewChat() {
        const id = Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        const newChat = {
          id,
          name: 'New Chat',
          messages: [],
          systemPrompt: ''
        };
        STATE.chats.unshift(newChat);
        saveChats();
        setActiveChat(id);
        renderChatList();
      }

      function setActiveChat(id) {
        STATE.activeChatId = id;
        const chat = STATE.chats.find(c => c.id === id);
        if (chat) {
          currentChatTitle.textContent = chat.name;
          systemPromptInput.value = chat.systemPrompt || '';
          renderMessages();
        }
        renderChatList();
        saveChats();
      }

      function getActiveChat() {
        return STATE.chats.find(c => c.id === STATE.activeChatId);
      }

      function renameChat(chatId) {
        const chat = STATE.chats.find(c => c.id === chatId);
        if (!chat) return;
        const newName = prompt('Enter new name:', chat.name);
        if (newName && newName.trim()) {
          chat.name = newName.trim();
          saveChats();
          if (chatId === STATE.activeChatId) currentChatTitle.textContent = chat.name;
          renderChatList();
        }
      }

      function deleteChat(chatId) {
        if (!confirm('Delete this chat?')) return;
        STATE.chats = STATE.chats.filter(c => c.id !== chatId);
        if (STATE.activeChatId === chatId) {
          STATE.activeChatId = STATE.chats.length > 0 ? STATE.chats[0].id : null;
          if (STATE.activeChatId) {
            setActiveChat(STATE.activeChatId);
          } else {
            createNewChat();
          }
        }
        saveChats();
        renderChatList();
        renderMessages();
      }

      function renderChatList() {
        chatListEl.innerHTML = STATE.chats.map(chat => `
          <div data-chat-id="${chat.id}" class="group flex items-center justify-between p-2 rounded-lg cursor-pointer hover:bg-gray-200 dark:hover:bg-dark-700 ${chat.id === STATE.activeChatId ? 'bg-gray-200 dark:bg-dark-700 font-medium' : ''}">
            <span class="truncate flex-1" onclick="document.querySelector('[data-chat-id=\\'${chat.id}\\']').click();">${escapeHtml(chat.name)}</span>
            <button class="opacity-0 group-hover:opacity-100 p-1 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300" data-chat-id="${chat.id}" onclick="event.stopPropagation(); showContextMenu(event.clientX, event.clientY, '${chat.id}')">⋯</button>
          </div>
        `).join('');
        // Re-attach click listeners for each chat item
        document.querySelectorAll('[data-chat-id]').forEach(el => {
          el.addEventListener('click', (e) => {
            const id = el.dataset.chatId;
            if (id) setActiveChat(id);
          });
        });
      }

      function renderMessages() {
        const chat = getActiveChat();
        chatContainer.innerHTML = '';
        if (!chat || chat.messages.length === 0) {
          chatContainer.innerHTML = `<div class="text-center text-gray-400 dark:text-gray-500 mt-20">Start a conversation with Jarvis</div>`;
          return;
        }
        chat.messages.forEach((msg, i) => {
          appendMessageToDOM(msg.role, msg.content, i === chat.messages.length - 1 && msg.role === 'assistant');
        });
        scrollToBottom();
      }

      function appendMessageToDOM(role, content, isLastAssistant = false) {
        const div = document.createElement('div');
        div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} chat-message`;
        const bubbleClass = role === 'user'
          ? 'bg-blue-600 text-white rounded-2xl rounded-br-md max-w-[85%]'
          : 'bg-gray-100 dark:bg-dark-800 rounded-2xl rounded-bl-md max-w-[85%] border border-gray-200 dark:border-gray-700';
        div.innerHTML = `
          <div class="${bubbleClass} px-4 py-2 text-sm">
            <div class="message-content">${role === 'user' ? escapeHtml(content) : marked.parse(content)}</div>
            ${role === 'assistant' ? `<button class="speak-btn mt-1 text-xs text-gray-500 dark:text-gray-400 hover:text-blue-500 inline-flex items-center gap-1" title="Read aloud"><svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072M17.95 6.05a8 8 0 010 11.9M6.5 8.8l4.7-3.6a.5.5 0 01.8.4v12.8a.5.5 0 01-.8.4L6.5 15.2H3.5a1 1 0 01-1-1v-4.4a1 1 0 011-1h3z" /></svg> Speak</button>` : ''}
          </div>
        `;
        chatContainer.appendChild(div);
        // Attach speak button
        const speakBtn = div.querySelector('.speak-btn');
        if (speakBtn) {
          speakBtn.addEventListener('click', () => speakText(content));
        }
        return div;
      }

      function handleSend() {
        const text = userInput.value.trim();
        if (!text) return;
        const chat = getActiveChat();
        if (!chat) return;
        // Add user message
        chat.messages.push({ role: 'user', content: text });
        userInput.value = '';
        autoResizeTextarea();
        renderMessages();
        saveChats();
        // Call AI
        callOpenRouter(chat);
      }

      async function callOpenRouter(chat) {
        if (!STATE.apiKey) {
          alert('Please set your OpenRouter API key in Settings first.');
          return;
        }
        // Create assistant placeholder
        const assistantMsg = { role: 'assistant', content: '' };
        chat.messages.push(assistantMsg);
        saveChats();
        renderMessages(); // placeholder with speak button but empty
        const assistantDiv = chatContainer.lastElementChild;
        const contentDiv = assistantDiv.querySelector('.message-content');
        contentDiv.innerHTML = '<span class="typing-cursor"></span>';
        scrollToBottom();

        // Prepare messages array with system prompt
        const messages = [];
        if (chat.systemPrompt) {
          messages.push({ role: 'system', content: chat.systemPrompt });
        }
        // Add all previous messages except the last empty assistant one
        chat.messages.slice(0, -1).forEach(m => messages.push({ role: m.role, content: m.content }));

        const controller = new AbortController();
        STATE.streamingAbort = controller;
        sendBtn.disabled = true;

        try {
          const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${STATE.apiKey}`,
            },
            body: JSON.stringify({
              model: STATE.model,
              messages: messages,
              stream: true,
            }),
            signal: controller.signal,
          });

          if (!response.ok) {
            const err = await response.text();
            throw new Error(`API Error: ${response.status} ${err}`);
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (const line of lines) {
              const trimmed = line.trim();
              if (!trimmed || !trimmed.startsWith('data: ')) continue;
              const data = trimmed.slice(6);
              if (data === '[DONE]') continue;
              try {
                const parsed = JSON.parse(data);
                const content = parsed.choices?.[0]?.delta?.content;
                if (content) {
                  assistantMsg.content += content;
                  // Update DOM with typing animation
                  contentDiv.innerHTML = marked.parse(assistantMsg.content) + '<span class="typing-cursor"></span>';
                  scrollToBottom();
                }
              } catch (e) { /* ignore malformed JSON */ }
            }
          }
          // Streaming finished
          contentDiv.innerHTML = marked.parse(assistantMsg.content);
          // Add speak button again if missing
          if (!assistantDiv.querySelector('.speak-btn')) {
            const speakBtn = document.createElement('button');
            speakBtn.className = 'speak-btn mt-1 text-xs text-gray-500 dark:text-gray-400 hover:text-blue-500 inline-flex items-center gap-1';
            speakBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072M17.95 6.05a8 8 0 010 11.9M6.5 8.8l4.7-3.6a.5.5 0 01.8.4v12.8a.5.5 0 01-.8.4L6.5 15.2H3.5a1 1 0 01-1-1v-4.4a1 1 0 011-1h3z" /></svg> Speak`;
            speakBtn.addEventListener('click', () => speakText(assistantMsg.content));
            assistantDiv.querySelector('.flex-1')?.appendChild(speakBtn); // Adjust
            const bubble = assistantDiv.querySelector('.rounded-2xl');
            if (bubble) bubble.appendChild(speakBtn);
          }
        } catch (err) {
          if (err.name === 'AbortError') {
            assistantMsg.content += ' [Stream stopped]';
          } else {
            assistantMsg.content = `Error: ${err.message}`;
          }
          contentDiv.innerHTML = marked.parse(assistantMsg.content);
        } finally {
          STATE.streamingAbort = null;
          sendBtn.disabled = false;
          saveChats();
          scrollToBottom();
        }
      }

      function abortStream() {
        if (STATE.streamingAbort) {
          STATE.streamingAbort.abort();
          STATE.streamingAbort = null;
        }
      }

      function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }

      function autoResizeTextarea() {
        userInput.style.height = 'auto';
        userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
      }

      // ---------- VOICE INPUT ----------
      function toggleVoiceInput() {
        if (STATE.isListening) {
          stopListening();
        } else {
          startListening();
        }
      }

      function startListening() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          alert('Speech recognition not supported in this browser.');
          return;
        }
        if (!STATE.recognition) {
          STATE.recognition = new SpeechRecognition();
          STATE.recognition.continuous = false;
          STATE.recognition.interimResults = false;
          STATE.recognition.lang = 'en-US';
          STATE.recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            userInput.value = transcript;
            autoResizeTextarea();
            if (STATE.autoSendVoice) {
              handleSend();
            }
            stopListening();
          };
          STATE.recognition.onerror = (event) => {
            console.error('Speech error:', event.error);
            stopListening();
          };
          STATE.recognition.onend = () => {
            stopListening();
          };
        }
        try {
          STATE.recognition.start();
          STATE.isListening = true;
          micIcon.innerHTML = `<circle cx="12" cy="12" r="6" fill="red" stroke="red"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />`; // mic with red background
          voiceToast.classList.remove('hidden');
          voiceText.textContent = 'Listening...';
        } catch (e) {
          console.error(e);
        }
      }

      function stopListening() {
        if (STATE.recognition) {
          STATE.recognition.abort();
        }
        STATE.isListening = false;
        micIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />`;
        voiceToast.classList.add('hidden');
      }

      // ---------- VOICE OUTPUT (TTS) ----------
      function speakText(text) {
        if (!window.speechSynthesis) {
          alert('Text-to-speech not supported.');
          return;
        }
        // Cancel any ongoing speech
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text.replace(/<[^>]*>/g, '')); // strip HTML for plain text
        utterance.lang = 'en-US';
        utterance.rate = 1.1;
        window.speechSynthesis.speak(utterance);
      }

      // ---------- DARK MODE ----------
      function toggleDarkMode() {
        STATE.darkMode = !STATE.darkMode;
        document.documentElement.classList.toggle('dark', STATE.darkMode);
        localStorage.setItem('jarvis_dark', STATE.darkMode);
        updateDarkIcon();
      }

      function updateDarkIcon() {
        if (STATE.darkMode) {
          darkIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />';
        } else {
          darkIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />';
        }
      }

      // ---------- SIDEBAR TOGGLE (MOBILE) ----------
      function toggleSidebar() {
        sidebar.classList.toggle('-translate-x-full');
      }

      // ---------- SETTINGS ----------
      function saveSettings() {
        STATE.apiKey = apiKeyInput.value.trim();
        STATE.model = modelInput.value.trim() || 'deepseek/deepseek-r1:free';
        STATE.autoSendVoice = autoSendVoiceCheck.checked;
        localStorage.setItem('jarvis_api_key', STATE.apiKey);
        localStorage.setItem('jarvis_model', STATE.model);
        localStorage.setItem('jarvis_auto_voice', STATE.autoSendVoice);
        // Update system prompt for active chat
        const chat = getActiveChat();
        if (chat) {
          chat.systemPrompt = systemPromptInput.value.trim();
          saveChats();
        }
        settingsModal.classList.add('hidden');
      }

      // Populate settings on open
      settingsBtn.addEventListener('click', () => {
        apiKeyInput.value = STATE.apiKey;
        modelInput.value = STATE.model;
        autoSendVoiceCheck.checked = STATE.autoSendVoice;
        const chat = getActiveChat();
        systemPromptInput.value = chat ? chat.systemPrompt : '';
      });

      // ---------- CONTEXT MENU ----------
      function showContextMenu(x, y, chatId) {
        contextMenu.dataset.chatId = chatId;
        contextMenu.style.left = `${x}px`;
        contextMenu.style.top = `${y}px`;
        contextMenu.classList.remove('hidden');
        // Adjust if off-screen
        const rect = contextMenu.getBoundingClientRect();
        if (rect.right > window.innerWidth) contextMenu.style.left = `${x - rect.width}px`;
        if (rect.bottom > window.innerHeight) contextMenu.style.top = `${y - rect.height}px`;
      }

      function escapeHtml(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return text.replace(/[&<>"']/g, m => map[m]);
      }

      // Handle abort on navigation etc.
      window.addEventListener('beforeunload', () => {
        if (STATE.streamingAbort) abortStream();
      });
    });
  </script>
</body>
</html>
